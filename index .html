<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>know.</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:#0a0a0f; color:#f0f0f5; font-family:-apple-system,system-ui,sans-serif; overflow:hidden; overscroll-behavior:none; }

  /* HEADER */
  #header { position:fixed; top:0; left:0; right:0; z-index:100; padding:calc(env(safe-area-inset-top) + 12px) 16px 10px; background:linear-gradient(to bottom, rgba(10,10,15,0.97) 60%, transparent); display:flex; align-items:center; gap:12px; }
  #logo { font-weight:800; font-size:20px; letter-spacing:-0.5px; flex-shrink:0; }
  #logo span { color:#7eb8d4; }
  #settings-btn { margin-left:auto; background:none; border:none; color:rgba(240,240,245,0.4); font-size:18px; cursor:pointer; flex-shrink:0; padding:4px; }
  #filter-bar { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  #filter-bar::-webkit-scrollbar { display:none; }
  .chip { flex-shrink:0; padding:4px 10px; border-radius:20px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:rgba(240,240,245,0.5); font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .chip.active { color:#0a0a0f !important; border-color:transparent; }

  /* FEED */
  #feed { height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  #feed::-webkit-scrollbar { display:none; }
  .card { height:100dvh; scroll-snap-align:start; scroll-snap-stop:always; position:relative; display:flex; flex-direction:column; justify-content:flex-end; }
  .card-bg { position:absolute; inset:0; }
  .card-grad { position:absolute; inset:0; background:linear-gradient(to bottom, transparent 20%, rgba(10,10,15,0.75) 60%, rgba(10,10,15,0.98) 100%); }
  .card-content { position:relative; z-index:2; padding:24px 20px calc(env(safe-area-inset-bottom) + 28px); }
  .badge { display:inline-block; color:#0a0a0f; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:3px 10px; border-radius:20px; margin-bottom:10px; }
  .emoji { font-size:50px; line-height:1; margin-bottom:10px; }
  .title { font-weight:700; font-size:21px; line-height:1.25; margin-bottom:10px; letter-spacing:-0.3px; }
  .fact { font-size:14px; line-height:1.65; color:rgba(240,240,245,0.85); margin-bottom:16px; }
  .actions { display:flex; gap:16px; margin-bottom:12px; }
  .action-btn { background:none; border:none; cursor:pointer; color:rgba(240,240,245,0.5); display:flex; align-items:center; gap:5px; font-size:13px; font-family:inherit; }
  .action-btn.on-like { color:#e87c9a; }
  .action-btn.on-bm { color:#e8a87c; }
  .dive-btn { width:100%; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.06); color:#f0f0f5; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit; }

  /* END CARD */
  #end-card { height:100dvh; scroll-snap-align:start; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:24px; }
  #load-btn { padding:12px 28px; border-radius:24px; border:none; background:#7eb8d4; color:#0a0a0f; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)} }
  .pulsing { animation:pulse 1.2s ease-in-out infinite; }

  /* PANEL */
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:150; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  #overlay.show { opacity:1; pointer-events:all; }
  #panel { position:fixed; bottom:0; left:0; right:0; z-index:200; background:#13131a; border-radius:20px 20px 0 0; border-top:1px solid rgba(255,255,255,0.08); max-height:78dvh; display:flex; flex-direction:column; transform:translateY(105%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); }
  #panel.show { transform:translateY(0); }
  .handle { width:36px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; margin:12px auto 0; flex-shrink:0; }
  .panel-head { padding:10px 18px; border-bottom:1px solid rgba(255,255,255,0.07); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  #quickQ { display:flex; gap:8px; padding:10px 14px; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0; }
  #quickQ::-webkit-scrollbar { display:none; }
  .qq { flex-shrink:0; padding:6px 12px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); background:#1c1c27; color:rgba(240,240,245,0.8); font-size:12px; cursor:pointer; white-space:nowrap; font-family:inherit; }
  #msgs { flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:10px; -webkit-overflow-scrolling:touch; }
  .msg { max-width:85%; padding:10px 14px; border-radius:14px; font-size:13.5px; line-height:1.55; }
  .msg.user { align-self:flex-end; background:#1c1c27; border-bottom-right-radius:4px; }
  .msg.ai { align-self:flex-start; background:rgba(126,184,212,0.12); border:1px solid rgba(126,184,212,0.2); border-bottom-left-radius:4px; }
  .msg.thinking { opacity:0.6; font-style:italic; }
  .input-row { padding:10px 14px calc(env(safe-area-inset-bottom) + 14px); display:flex; gap:8px; align-items:center; border-top:1px solid rgba(255,255,255,0.07); flex-shrink:0; }
  #chat-input { flex:1; background:#1c1c27; border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:10px 16px; color:#f0f0f5; font-size:16px; outline:none; font-family:inherit; }
  #send-btn { width:38px; height:38px; border-radius:50%; background:#7eb8d4; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; }

  /* TOAST */
  #toast { position:fixed; bottom:calc(env(safe-area-inset-bottom) + 24px); left:50%; transform:translateX(-50%) translateY(20px); background:#1c1c27; border:1px solid rgba(255,255,255,0.1); padding:10px 18px; border-radius:20px; font-size:13px; z-index:300; opacity:0; transition:all 0.3s; white-space:nowrap; pointer-events:none; max-width:90vw; overflow:hidden; text-overflow:ellipsis; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* SETUP */
  #setup { position:fixed; inset:0; z-index:400; background:#0a0a0f; display:none; flex-direction:column; justify-content:center; padding:32px 24px; gap:14px; }
  #setup.show { display:flex; }
  #setup h2 { font-size:22px; font-weight:800; }
  #setup p { font-size:13px; line-height:1.6; color:rgba(240,240,245,0.6); }
  #setup input { background:#1c1c27; border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:13px 16px; color:#f0f0f5; font-size:15px; outline:none; font-family:inherit; width:100%; }
  #setup button { padding:14px; border-radius:12px; border:none; background:#7eb8d4; color:#0a0a0f; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .setup-hint { font-size:11px !important; color:rgba(240,240,245,0.35) !important; }
</style>
</head>
<body>

<!-- Setup screen (first launch) -->
<div id="setup">
  <h2>know<span style="color:#7eb8d4">.</span></h2>
  <p>Verbinde deinen Cloudflare Worker, der Anfragen an die Anthropic API weiterleitet (gleiche Architektur wie deine Coaching-App).</p>
  <input id="worker-url" type="url" placeholder="https://dein-worker.workers.dev" autocomplete="off">
  <input id="api-key" type="password" placeholder="Anthropic API-Key (sk-ant-...)" autocomplete="off">
  <p class="setup-hint">Worker-URL und API-Key werden nur lokal auf deinem Geraet gespeichert (localStorage) — gleiche Architektur wie deine Coaching-App.</p>
  <button onclick="saveSetup()">Los geht's</button>
</div>

<!-- Header -->
<div id="header">
  <div id="logo">know<span>.</span></div>
  <div id="filter-bar"></div>
  <button id="settings-btn" onclick="openSetup()">⚙︎</button>
</div>

<!-- Feed -->
<div id="feed"></div>

<!-- Overlay + Panel -->
<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="handle"></div>
  <div class="panel-head">
    <div>
      <div style="font-weight:700;font-size:15px">🤖 Tiefer eintauchen</div>
      <div id="panel-topic" style="font-size:11px;color:rgba(240,240,245,0.45);margin-top:1px"></div>
    </div>
    <button onclick="closePanel()" style="background:none;border:none;color:rgba(240,240,245,0.5);cursor:pointer;font-size:20px;padding:4px">✕</button>
  </div>
  <div id="quickQ"></div>
  <div id="msgs"></div>
  <div class="input-row">
    <input id="chat-input" type="text" placeholder="Stell eine Frage..." enterkeyhint="send">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";

// ============ CONFIG ============
const LS = {
  worker: "know_worker_url",
  apikey: "know_apikey",
  cards: "know_cards",
  likes: "know_likes",
  bookmarks: "know_bookmarks",
  seen: "know_seen_titles"
};
const MODELS = ["claude-3-5-haiku-20241022", "claude-sonnet-4-5"]; // haiku first (bewaehrt mit diesem Worker)

const CAT_COLORS = { Geschichte:"#e8a87c", Wissenschaft:"#7eb8d4", Psychologie:"#b49fcc", Technologie:"#7ecfb0", Allgemein:"#e87c9a" };
const CAT_RGBA = { Geschichte:"232,168,124", Wissenschaft:"126,184,212", Psychologie:"180,159,204", Technologie:"126,207,176", Allgemein:"232,124,154" };
const CAT_EMOJIS = {
  Geschichte:["🏛️","⚔️","👑","📜","🗿","🏺","🛡️","🕌"],
  Wissenschaft:["🔬","🧬","🌋","🪐","⚛️","🧲","🌊","❄️"],
  Psychologie:["🧠","💭","🎭","🪞","💤","👁️","🤝","🌀"],
  Technologie:["🤖","💻","🛰️","🔋","📡","🚀","⚙️","💾"],
  Allgemein:["🌍","🦜","🍄","🐋","🌳","🎻","🗺️","🧩"]
};
const CATS = ["Alle","Geschichte","Wissenschaft","Psychologie","Technologie","Allgemein"];
const ALL_CATS = CATS.slice(1);

const SEED_CARDS = [
  { cat:"Geschichte", emoji:"⚔️", title:"Das Rätsel von Roms Untergang",
    fact:"Das Weströmische Reich fiel 476 n. Chr. — aber nicht durch eine einzige Katastrophe. Historiker streiten bis heute: War es Migration, Klimawandel oder wirtschaftlicher Kollaps? Wahrscheinlich alles zusammen.",
    quickQ:["Wer waren die Vandalen?","Was überlebte von Rom?","Wann fiel Ostrom?"] },
  { cat:"Wissenschaft", emoji:"🌌", title:"Dunkle Materie: Was wir nicht sehen",
    fact:"27% des Universums besteht aus Dunkler Materie — Stoff, der nicht leuchtet, nichts reflektiert, aber Gravitation ausübt. Ohne sie würden Galaxien auseinanderreißen. Wir haben noch nie ein Teilchen davon direkt nachgewiesen.",
    quickQ:["Was ist Dunkle Energie?","Wie messen wir sie?","Gibt es Alternativen?"] },
  { cat:"Psychologie", emoji:"🧠", title:"Der Dunning-Kruger-Effekt",
    fact:"Menschen mit wenig Wissen überschätzen sich massiv — weil ihnen das Wissen fehlt, ihre eigene Inkompetenz zu erkennen. Experten zweifeln mehr, weil sie die Komplexität sehen.",
    quickQ:["Wie vermeide ich das?","Wer hat es entdeckt?","Gibt es Gegenbeispiele?"] },
  { cat:"Technologie", emoji:"⚡", title:"Wie KI-Modelle wirklich denken",
    fact:"ChatGPT, Claude, Gemini basieren alle auf der Transformer-Architektur von 2017. Das Kernprinzip: Attention — das Modell lernt, welche Wörter für die Vorhersage des nächsten wichtig sind.",
    quickQ:["Was sind Parameter?","Wie wird trainiert?","Was kommt nach Transformer?"] },
  { cat:"Allgemein", emoji:"🐙", title:"Oktopusse: Intelligenz neu gedacht",
    fact:"Ein Oktopus hat 500 Millionen Neuronen — ähnlich wie ein Hund. Aber 2/3 davon sitzen in seinen Armen, nicht im Gehirn. Jeder Arm denkt teilweise selbst.",
    quickQ:["Wie lange leben sie?","Können sie lernen?","Was sind Kopffüßer?"] },
  { cat:"Geschichte", emoji:"🧭", title:"Die Seidenstraße verband Welten",
    fact:"Die Seidenstraße war ein Netzwerk von Routen zwischen China und dem Mittelmeer. Sie transportierte nicht nur Seide, sondern auch Ideen, Religionen und Technologie über Kontinente hinweg.",
    quickQ:["Wann existierte sie?","Wer kontrollierte sie?","Was ist die neue Seidenstraße?"] },
  { cat:"Wissenschaft", emoji:"🦠", title:"Das Mikrobiom: Du bist nicht allein",
    fact:"In deinem Körper leben 38 Billionen Bakterien — mehr als deine eigenen Körperzellen. Sie beeinflussen deine Stimmung, dein Immunsystem und sogar deine Entscheidungen.",
    quickQ:["Was schädigt das Mikrobiom?","Wie verbessere ich es?","Probiotika sinnvoll?"] },
  { cat:"Psychologie", emoji:"💭", title:"Kognitive Verzerrungen im Alltag",
    fact:"Dein Gehirn trifft täglich tausende Entscheidungen auf Autopilot. Der Bestätigungsfehler lässt dich nur Infos wahrnehmen, die deine Meinung stützen. Bewusstsein hilft — eliminiert Bias aber nicht.",
    quickQ:["Welche Bias sind häufig?","Wie trainiere ich dagegen?","Was sagt Kahneman?"] },
];

// ============ STATE ============
let workerUrl = localStorage.getItem(LS.worker) || "https://spring-water-f9f9.philipp-zart.workers.dev";
let apiKey = localStorage.getItem(LS.apikey) || "";
let cards = loadJSON(LS.cards) || SEED_CARDS.slice();
let likes = loadJSON(LS.likes) || {};
let bookmarks = loadJSON(LS.bookmarks) || {};
let seenTitles = new Set(loadJSON(LS.seen) || SEED_CARDS.map(c => c.title));
let filter = "Alle";
let generating = false;
let panelCard = null;
let chatHistory = [];
let chatLoading = false;

function loadJSON(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } }
function saveState() {
  try {
    localStorage.setItem(LS.cards, JSON.stringify(cards.slice(-100))); // keep last 100
    localStorage.setItem(LS.likes, JSON.stringify(likes));
    localStorage.setItem(LS.bookmarks, JSON.stringify(bookmarks));
    localStorage.setItem(LS.seen, JSON.stringify([...seenTitles].slice(-200)));
  } catch {}
}

// ============ AI CALL via Worker ============
async function callAI(promptText, maxTokens) {
  if (!workerUrl) throw new Error("Kein Worker konfiguriert");
  if (!apiKey) { openSetup(); throw new Error("Kein API-Key hinterlegt"); }
  let lastErr = null;
  for (const model of MODELS) {
    try {
      const res = await fetch(workerUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01" },
        body: JSON.stringify({
          model,
          max_tokens: maxTokens || 1200,
          messages: [{ role: "user", content: promptText }]
        })
      });
      if (!res.ok) { lastErr = new Error("HTTP " + res.status); continue; }
      const data = await res.json();
      const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
      if (text) return text;
      lastErr = new Error("Leere Antwort");
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("Unbekannter Fehler");
}

// ============ SETUP ============
function openSetup() {
  document.getElementById("worker-url").value = workerUrl;
  document.getElementById("api-key").value = apiKey;
  document.getElementById("setup").classList.add("show");
}
function saveSetup() {
  const v = document.getElementById("worker-url").value.trim();
  const k = document.getElementById("api-key").value.trim();
  if (!v.startsWith("http")) { showToast("Bitte gueltige Worker-URL eingeben"); return; }
  if (!k.startsWith("sk-")) { showToast("Bitte gueltigen API-Key eingeben"); return; }
  workerUrl = v.replace(/\/$/, "");
  apiKey = k;
  localStorage.setItem(LS.worker, workerUrl);
  localStorage.setItem(LS.apikey, apiKey);
  document.getElementById("setup").classList.remove("show");
  showToast("✓ Verbunden");
}

// ============ UI HELPERS ============
function pickEmoji(cat) { const p = CAT_EMOJIS[cat] || CAT_EMOJIS.Allgemein; return p[Math.floor(Math.random()*p.length)]; }
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
}

// ============ RENDER ============
function visibleCards() { return filter === "Alle" ? cards : cards.filter(c => c.cat === filter); }

function renderFilterBar() {
  const bar = document.getElementById("filter-bar");
  bar.innerHTML = "";
  CATS.forEach(cat => {
    const b = document.createElement("button");
    b.className = "chip" + (filter === cat ? " active" : "");
    b.textContent = cat;
    if (cat !== "Alle") {
      b.style.color = filter === cat ? "#0a0a0f" : CAT_COLORS[cat];
      b.style.borderColor = filter === cat ? "transparent" : CAT_COLORS[cat] + "55";
    }
    if (filter === cat) b.style.background = cat === "Alle" ? "#f0f0f5" : CAT_COLORS[cat];
    b.onclick = () => { filter = cat; renderAll(); document.getElementById("feed").scrollTop = 0; };
    bar.appendChild(b);
  });
}

function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  const vis = visibleCards();

  vis.forEach((card, i) => {
    const col = CAT_COLORS[card.cat] || "#7eb8d4";
    const rgb = CAT_RGBA[card.cat] || "126,184,212";
    if (!card._x) { card._x = 20 + Math.floor(Math.random()*50); card._y = 15 + Math.floor(Math.random()*40); }

    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `
      <div class="card-bg" style="background:radial-gradient(ellipse at ${card._x}% ${card._y}%, rgba(${rgb},0.25) 0%, transparent 60%), #0a0a0f"></div>
      <div class="card-grad"></div>
      <div class="card-content">
        <div class="badge" style="background:${col}">${esc(card.cat)}</div>
        <div class="emoji">${card.emoji}</div>
        <div class="title">${esc(card.title)}</div>
        <div class="fact">${esc(card.fact)}</div>
        <div class="actions">
          <button class="action-btn ${likes[card.title] ? "on-like" : ""}" data-act="like">
            ${likes[card.title] ? "❤️" : "🤍"} Interessant
          </button>
          <button class="action-btn ${bookmarks[card.title] ? "on-bm" : ""}" data-act="bm">
            ${bookmarks[card.title] ? "🔖" : "📑"} Speichern
          </button>
        </div>
        <button class="dive-btn" data-act="dive">🤖 Tiefer eintauchen — Frag die KI</button>
      </div>`;
    el.querySelector('[data-act="like"]').onclick = () => { likes[card.title] = !likes[card.title]; saveState(); renderFeedPreserveScroll(); if (likes[card.title]) showToast("❤️ Interessant markiert"); };
    el.querySelector('[data-act="bm"]').onclick = () => { bookmarks[card.title] = !bookmarks[card.title]; saveState(); renderFeedPreserveScroll(); showToast(bookmarks[card.title] ? "🔖 Gespeichert" : "Entfernt"); };
    el.querySelector('[data-act="dive"]').onclick = () => openPanel(card);
    feed.appendChild(el);
  });

  // End card
  const end = document.createElement("div");
  end.id = "end-card";
  end.innerHTML = generating
    ? `<div class="pulsing" style="font-size:40px">✨</div><div style="font-size:14px;color:rgba(240,240,245,0.5)">Neue Themen werden generiert...</div>`
    : `<div style="font-size:40px">🔭</div><div style="font-size:14px;color:rgba(240,240,245,0.5);text-align:center">Mehr Wissen wartet auf dich</div><button id="load-btn">Neue Themen laden</button>`;
  if (!generating) end.querySelector("#load-btn").onclick = loadMore;
  feed.appendChild(end);

  setupSentinel();
}

let savedScroll = 0;
function renderFeedPreserveScroll() {
  const feed = document.getElementById("feed");
  savedScroll = feed.scrollTop;
  renderFeed();
  feed.scrollTop = savedScroll;
}

function renderAll() { renderFilterBar(); renderFeed(); }

// ============ INFINITE SCROLL ============
let observer = null;
function setupSentinel() {
  if (observer) observer.disconnect();
  const feed = document.getElementById("feed");
  const cardEls = feed.querySelectorAll(".card");
  if (cardEls.length < 2) return;
  const target = cardEls[cardEls.length - 2]; // second-to-last card
  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !generating) loadMore();
  }, { threshold: 0.3 });
  observer.observe(target);
}

async function loadMore() {
  if (generating) return;
  if (!workerUrl || !apiKey) { openSetup(); return; }
  generating = true;
  renderFeedPreserveScroll();

  const targetCats = filter === "Alle" ? ALL_CATS : [filter];
  const seen = [...seenTitles].slice(-25).join("; ");

  const prompt = `Generiere genau 3 neue faszinierende Wissens-Themen auf Deutsch fuer eine Lern-App.
Erlaubte Kategorien: ${targetCats.join(", ")}
Diese Themen NICHT wiederholen: ${seen}

Antworte AUSSCHLIESSLICH mit einem JSON-Array, ohne Markdown, ohne Text drumherum:
[{"cat":"Geschichte","title":"Kurzer Titel","fact":"Zwei bis drei packende Saetze.","quickQ":["Frage 1?","Frage 2?","Frage 3?"]}]

Regeln:
- cat exakt eine aus: ${targetCats.join(", ")}
- fact: 2 bis 3 lehrreiche, ueberraschende Saetze auf Deutsch (Umlaute sind hier erlaubt)
- quickQ: genau 3 kurze Fragen`;

  try {
    const raw = await callAI(prompt, 1200);
    const start = raw.indexOf("[");
    const end = raw.lastIndexOf("]");
    if (start === -1 || end <= start) throw new Error("Kein JSON in Antwort");
    const parsed = JSON.parse(raw.slice(start, end + 1));

    const fresh = (Array.isArray(parsed) ? parsed : [])
      .filter(c => c && c.title && c.cat && c.fact && !seenTitles.has(c.title))
      .map(c => {
        seenTitles.add(c.title);
        return {
          cat: CAT_COLORS[c.cat] ? c.cat : "Allgemein",
          emoji: pickEmoji(c.cat),
          title: c.title,
          fact: c.fact,
          quickQ: Array.isArray(c.quickQ) && c.quickQ.length ? c.quickQ.slice(0,3) : ["Erzähl mir mehr!","Warum ist das so?","Gibt es Beispiele?"]
        };
      });

    if (fresh.length) {
      cards = cards.concat(fresh);
      saveState();
      showToast(`✨ ${fresh.length} neue Themen geladen`);
    } else {
      showToast("Keine neuen Themen erhalten");
    }
  } catch (e) {
    showToast("Fehler: " + (e.message || e));
  }

  generating = false;
  renderFeedPreserveScroll();
}

// ============ CHAT PANEL ============
function openPanel(card) {
  panelCard = card;
  chatHistory = [];
  document.getElementById("panel-topic").textContent = card.title;
  const qq = document.getElementById("quickQ");
  qq.innerHTML = "";
  card.quickQ.forEach(q => {
    const b = document.createElement("button");
    b.className = "qq"; b.textContent = q;
    b.onclick = () => sendMessage(q);
    qq.appendChild(b);
  });
  const msgs = document.getElementById("msgs");
  msgs.innerHTML = "";
  addMsg("ai", "Bereit! Was willst du zu diesem Thema wissen?");
  document.getElementById("panel").classList.add("show");
  document.getElementById("overlay").classList.add("show");
}
function closePanel() {
  document.getElementById("panel").classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
}
function addMsg(role, text, thinking) {
  const msgs = document.getElementById("msgs");
  const d = document.createElement("div");
  d.className = "msg " + role + (thinking ? " thinking" : "");
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

async function sendMessage(presetText) {
  const inp = document.getElementById("chat-input");
  const msg = (presetText !== undefined ? presetText : inp.value).trim();
  if (!msg || chatLoading) return;
  inp.value = "";
  chatLoading = true;

  addMsg("user", msg);
  chatHistory.push({ role: "user", content: msg });
  const thinkingEl = addMsg("ai", "Denke nach...", true);

  const historyText = chatHistory.map(m => (m.role === "user" ? "Nutzer: " : "Tutor: ") + m.content).join("\n");
  const prompt = `Du bist ein begeisterter Wissens-Tutor in einer Lern-App.
Thema: "${panelCard.title}"
Kontext: "${panelCard.fact}"

Bisheriger Dialog:
${historyText}

Antworte als Tutor auf die letzte Nutzer-Frage: auf Deutsch, praezise, 2-4 Saetze, wecke Neugier. Antworte NUR mit deiner Tutor-Antwort, ohne Praefix.`;

  try {
    const reply = (await callAI(prompt, 800)).replace(/^Tutor:\s*/i, "").trim();
    thinkingEl.textContent = reply || "Keine Antwort erhalten.";
    thinkingEl.classList.remove("thinking");
    chatHistory.push({ role: "assistant", content: reply });
  } catch (e) {
    thinkingEl.textContent = "Fehler: " + (e.message || e);
    thinkingEl.classList.remove("thinking");
  }
  chatLoading = false;
}

document.getElementById("chat-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

// ============ INIT ============
renderAll();
if (!workerUrl || !apiKey) document.getElementById("setup").classList.add("show");
</script>
